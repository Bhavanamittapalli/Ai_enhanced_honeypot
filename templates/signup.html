<!DOCTYPE html>
<html>
<head>
<title>Admin Signup</title>
</head>

<body style="background:#020617;color:white;text-align:center;margin-top:100px;font-family:Segoe UI;">

<h2>🔐 Admin Signup</h2>

<form method="POST">
  <input name="username" placeholder="Username" required
         style="padding:10px;width:220px;"><br><br>

  <input name="password" type="password" placeholder="Password" required
         style="padding:10px;width:220px;"><br><br>

  <button type="submit"
          style="padding:10px 20px;background:#38bdf8;border:none;border-radius:6px;">
    Signup
  </button>
</form>

<p style="margin-top:20px;">
Already have account?
<a href="/login" style="color:#38bdf8;">Login</a>
</p>

</body>
</html>
